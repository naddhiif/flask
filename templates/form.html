<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Senja Berawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Memasang gambar pegunungan senja berawan sebagai background */
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Lapisan gelap tipis di atas gambar agar teks lebih mudah dibaca */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2; /* Biar posisi form berada di atas lapisan gelap */
            background: rgba(255, 255, 255, 0.12); /* Efek kaca transparan */
            backdrop-filter: blur(15px);           /* Bikin background di belakang kotak jadi blur */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .input-group label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            font-weight: 300;
            display: block;
            margin-bottom: 5px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            padding: 8px 0;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-bottom-color: #fca311; /* Berubah jadi oranye senja saat diklik */
        }

        button {
            width: 100%;
            background: #ffffff;
            color: #14213d;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: #fca311; /* Warna hangat senja saat di-hover */
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 163, 17, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Flask Mountain Sunset</h2>
        
        <form action="/" method="POST">
            <div class="input-group">
                <label for="namaDepan">Enter first name</label>
                <input type="text" id="namaDepan" name="namaDepan" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="namaBelakang">Enter last name</label>
                <input type="text" id="namaBelakang" name="namaBelakang" required autocomplete="off">
            </div>
            
            <button type="submit">Kirim</button>
        </form>
    </div>

</body>
</html>
